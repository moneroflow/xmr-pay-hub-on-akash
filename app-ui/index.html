<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MoneroFlow App</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ff6b6b; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 20px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #version { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 MoneroFlow</h1>
        <p>Privacy-First POS Interface</p>
        <button class="btn" id="greet-btn">Verify Connection</button>
        <div id="version">Checking version...</div>
    </div>
    <script>
        const { invoke } = window.__TAURI__.tauri;
        async function init() {
            try {
                const version = await invoke('get_app_version');
                document.getElementById('version').textContent = version;
            } catch (e) {
                document.getElementById('version').textContent = 'Tauri bridge not active';
            }
        }
        document.getElementById('greet-btn').onclick = async () => {
            try {
                const msg = await invoke('greet', { name: 'User' });
                alert(msg);
            } catch (e) {
                alert('Error connecting to Rust backend');
            }
        };
        init();
    </script>
</body>
</html>
