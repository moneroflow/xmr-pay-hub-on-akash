name: Deploy to Homelab

on:
  push:
    branches: [ main ]
  workflow_dispatch:     # This allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production app
        run: bun run build

      - name: Restart app with PM2
        run: |
          cd /home/node/moneroflow/workspace/xmrpay-flow-main
          pm2 delete xmrpay-flow || true
          pm2 start ecosystem.config.cjs --name xmrpay-flow || true
          pm2 save
          pm2 status
